<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#f2ebe1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>日文背词 — JLPT 10k</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Loading -->
  <div id="app-loading">
    <div class="spinner"></div>
    <p>加载词库中…</p>
  </div>

  <!-- App Root -->
  <div id="app-root">

    <!-- ════════ SCREEN: SETUP ════════ -->
    <div id="screen-setup" class="screen">
      <div class="app-header">
        <h1>日文背词</h1>
        <p>JLPT 10k · 填空练习</p>
      </div>
      <div class="screen-content">
        <div id="srs-summary" class="srs-summary"></div>

        <!-- Progress Snackbar -->
        <div id="progress-snack" class="progress-snack">
          <span style="flex:1" id="progress-snack-text">检测到上次进度</span>
          <button class="btn btn-sm" id="btn-resume">继续</button>
          <button class="btn btn-sm" id="btn-resume-clear">重新开始</button>
        </div>

        <div class="card">
          <p style="font-size:14px;margin-bottom:8px;color:var(--text)">选择背诵级别：</p>
          <div id="level-select"></div>

          <div class="count-row">
            <span style="font-size:14px">每轮题数：</span>
            <select id="quiz-count">
              <option value="5">5</option>
              <option value="10" selected>10</option>
              <option value="15">15</option>
              <option value="20">20</option>
              <option value="25">25</option>
              <option value="30">30</option>
            </select>
          </div>

          <div style="text-align:center;padding:8px 0">
            <button class="btn btn-primary" id="btn-start" disabled>开始答题</button>
          </div>
        </div>

        <div id="level-info" class="info-text">请至少选择一个级别</div>
        <div id="streak-display" class="info-text" style="display:none"></div>
      </div>
    </div>

    <!-- ════════ SCREEN: QUIZ ════════ -->
    <div id="screen-quiz" class="screen">
      <div class="quiz-header">
        <span id="q-counter">第 1 / 10 题</span>
        <span id="q-type" class="qtype">[日译中]</span>
        <span id="q-remaining">剩余 0 词</span>
        <span id="q-score" class="score">✓ 0  ✗ 0</span>
      </div>
      <div class="progress-track">
        <div class="bar" id="progress-bar" style="width:0%"></div>
      </div>
      <div class="screen-content" style="display:flex;flex-direction:column">

        <div class="card" style="flex:1;display:flex;flex-direction:column">

          <!-- Word Display -->
          <div id="word-area" class="word-display">
            <div class="furigana" id="q-furigana"></div>
            <div class="kanji" id="q-kanji"></div>
            <button class="pronounce-btn" id="pronounce-btn" style="display:none">🔊</button>
            <div class="pos" id="pos-area"></div>
          </div>

          <!-- Definition Display (CN→JP) -->
          <div id="def-area" class="word-display" style="display:none">
            <div class="def-display" id="q-def"></div>
          </div>

          <!-- Input Area -->
          <div id="input-area" class="input-area">
            <div class="input-group">
              <label id="prompt1">请输入中文释义：</label>
              <input type="text" id="ans-input1" autocomplete="off" autocapitalize="off" spellcheck="false">
            </div>
            <div class="input-group" id="input2-group" style="display:none">
              <label id="prompt2">请输入读音（振假名）：</label>
              <input type="text" id="ans-input2" autocomplete="off" autocapitalize="off" spellcheck="false">
            </div>
          </div>

          <!-- Feedback -->
          <div id="feedback" style="display:none">
            <div class="fb-icon" id="fb-icon"></div>
            <div class="fb-answer" id="fb-answer"></div>
            <div class="fb-srs" id="fb-srs"></div>
            <div class="fb-plus" id="fb-plus"></div>
            <div id="fb-sentences"></div>
          </div>

          <!-- Submit -->
          <div style="text-align:center;padding:8px 0">
            <button class="btn btn-primary" id="btn-submit">提交</button>
          </div>
          <div style="text-align:center;padding:4px 0">
            <button class="btn" id="btn-next" style="display:none">下一题 →</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ════════ SCREEN: RESULT ════════ -->
    <div id="screen-result" class="screen">
      <div class="app-header">
        <h1 id="result-title">练习结果</h1>
      </div>
      <div class="screen-content">
        <div class="result-pct" id="result-pct">0%</div>
        <div class="result-detail" id="result-detail"></div>
        <div class="result-list" id="result-list"></div>
        <div class="btn-row" style="margin-top:16px">
          <button class="btn btn-primary" id="btn-next-round">再来一组</button>
          <button class="btn" id="btn-go-home">返回主页</button>
        </div>
      </div>
    </div>

    <!-- ════════ SCREEN: WRONG BANK ════════ -->
    <div id="screen-wrong" class="screen">
      <div class="app-header">
        <h1>❌ 错题本</h1>
        <p>曾经答错的词，复习巩固</p>
      </div>
      <div class="screen-content">
        <div id="wb-level-select" class="wb-level-select card"></div>
        <div id="wb-content"><p class="empty-state">暂无错题 🎉</p></div>
        <div id="wb-btns" class="btn-row">
          <button class="btn btn-primary" id="btn-wb-review">复习选中级别</button>
          <button class="btn" id="btn-wb-clear" style="color:var(--wrong)">清空错题本</button>
        </div>
      </div>
    </div>

    <!-- ════════ Bottom Nav ════════ -->
    <div class="bottom-nav">
      <button id="nav-setup">📖 选择题库</button>
      <button id="nav-wrong">❌ 错题本</button>
    </div>
    <div id="btn-go-home2" style="display:none"></div>

  </div>

  <script src="app.js"></script>
</body>
</html>

name: Build Android APK

on:
  workflow_dispatch:    # 手动触发
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y \
            python3-pip python3-venv python3-dev \
            libssl-dev libffi-dev \
            build-essential git zip unzip \
            openjdk-17-jdk \
            autoconf autoconf-archive libtool libtool-bin pkgconf \
            ccache

      - name: Install buildozer & python-for-android
        run: |
          pip install --upgrade pip setuptools wheel
          # Install Cython first, then buildozer+p4a from git master
          pip install cython
          pip install git+https://github.com/kivy/buildozer.git
          pip install git+https://github.com/kivy/python-for-android.git

      - name: Fix libtool LT_SYS_SYMBOL_USCORE for libffi
        run: |
          # Ubuntu 24.04 has libtool 2.4.7+ which removed LT_SYS_SYMBOL_USCORE.
          # libffi (built by python-for-android) uses this macro in configure.ac.
          # Provide it via a compatibility shim.
          sudo install -d /usr/share/aclocal
          sudo tee /usr/share/aclocal/lt-sys-symbol-uscore.m4 << 'EOF'
          AC_DEFUN([LT_SYS_SYMBOL_USCORE],
          [m4_require([_LT_CMD_GLOBAL_SYMBOLS])dnl
          AC_CACHE_CHECK([whether the linker supports symbol underscore],
          [lt_cv_sys_symbol_underscore],
          [lt_cv_sys_symbol_underscore=no
          save_CFLAGS=$CFLAGS
          AC_COMPILE_IFELSE(
            [AC_LANG_SOURCE([int dont_use_me=0;])],
            [AS_IF([$NM $CFLAGS $CPPFLAGS conftest.$ac_objext | grep ' _dollar_underscore' > /dev/null 2>&1],
              [lt_cv_sys_symbol_underscore=yes])])
          CFLAGS=$save_CFLAGS])
          AS_IF([test "x$lt_cv_sys_symbol_underscore" = xyes], [$1])
          ])
          EOF

      - name: Build APK
        working-directory: ./android
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jlptquiz-apk
          path: android/bin/*.apk
          if-no-files-found: error
